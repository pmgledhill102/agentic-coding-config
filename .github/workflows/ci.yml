name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Lint
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v19
        with:
          globs: '**/*.md'

  shellcheck:
    name: ShellCheck (bin/)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: './bin'

  actionlint:
    name: Action Lint
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ./actionlint -color

  settings-sync:
    name: settings.json ↔ settings.json.md sync
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify both files change together
        run: |
          set -eu
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only "$base"..HEAD || true)
          json_changed=$(printf '%s\n' "$changed" | grep -c '^settings\.json$' || true)
          md_changed=$(printf '%s\n' "$changed" | grep -c '^settings\.json\.md$' || true)
          if [ "$json_changed" -ne "$md_changed" ]; then
            echo "::error::settings.json and settings.json.md must change together."
            echo "  settings.json changed:    $json_changed"
            echo "  settings.json.md changed: $md_changed"
            echo ""
            echo "JSON does not allow comments, so settings.json.md is the annotated companion."
            echo "Any rule added/removed/edited in one must be reflected in the other."
            exit 1
          fi
          if [ "$json_changed" -eq 0 ]; then
            echo "Neither file changed in this PR — sync trivially holds."
          else
            echo "Both files changed — sync OK."
          fi
